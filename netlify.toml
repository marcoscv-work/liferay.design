# The site is the Astro app in `astro/`. `base` points Netlify there for the
# install + build; the full repo is still checked out, so Astro reads
# ../src/markdown and ../static (publicDir). Output is astro/dist.
[build]
  base = "astro"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
